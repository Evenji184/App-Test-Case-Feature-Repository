services:
  mysql:
    restart: always
    ports: []
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./logs/mysql:/var/log/postgresql

  backend:
    restart: always
    volumes:
      - ./logs/backend:/app/logs
    environment:
      DEBUG: "false"
      ENVIRONMENT: production
    command: >
      sh -c "prisma generate
      && prisma db push
      && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

  frontend:
    restart: always
    ports: []

  nginx:
    restart: always
    ports:
      - "${NGINX_PORT:-80}:80"

