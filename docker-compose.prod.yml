services:
  mysql:
    restart: always
    ports: []
    volumes:
      - mysql_data:/var/lib/mysql
      - ./logs/mysql:/var/log/mysql

  backend:
    restart: always
    volumes:
      - ./logs/backend:/app/logs
    environment:
      DEBUG: "false"
      ENVIRONMENT: production
      FRONTEND_HOST: ${FRONTEND_HOST:-localhost}
      FRONTEND_PORT: ${FRONTEND_PORT:-5173}
      FRONTEND_SCHEME: ${FRONTEND_SCHEME:-http}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      IP_WHITELIST: ${IP_WHITELIST:-}
    command: >
      sh -c "prisma generate
      && prisma db push
      && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8001} --workers 2"

  frontend:
    restart: always
    ports: []

  nginx:
    restart: always
    ports:
      - "${NGINX_PORT:-80}:80"
